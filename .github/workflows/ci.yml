name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy proposal_gen

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --locked
      # Fail loudly if the runner image ever loses Chrome: the PDF-rendering
      # tests skip gracefully without it, which would silently drop coverage
      # of the one path that cannot be tested any other way.
      - name: Assert Chrome is discoverable
        run: uv run python -c "from proposal_gen.render import find_chrome; print(find_chrome())"
      - run: uv run pytest -v

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      # Build-only: proves the image assembles from the same lockfile CI
      # verifies. No registry push — the Dockerfile is the artifact.
      - run: docker build -t proposal-gen:ci .
