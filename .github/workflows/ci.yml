name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy proposal_gen scripts evals

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
      - run: uv sync --locked
      # Fail loudly if the runner image ever loses Chrome: the PDF-rendering
      # tests skip gracefully without it, which would silently drop coverage
      # of the one path that cannot be tested any other way.
      - name: Assert Chrome is discoverable
        run: uv run python -c "from proposal_gen.render import find_chrome; print(find_chrome())"
      - name: Run tests
        run: uv run pytest -v
        if: runner.os != 'Linux'
      # Coverage gate runs on Linux only: render.py's find_chrome() takes a
      # different code path per OS (PATH lookup vs. macOS app bundles vs.
      # Windows Program Files/LOCALAPPDATA), so the reachable-line count is
      # OS-specific. Pinning the gate to one OS keeps the floor meaningful
      # instead of chasing whichever runner covers the fewest branches.
      - name: Run tests with coverage gate
        run: uv run pytest -v --cov=proposal_gen --cov-fail-under=94
        if: runner.os == 'Linux'

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # Build-only: proves the image assembles from the same lockfile CI
      # verifies. No registry push — the Dockerfile is the artifact.
      - run: docker build -t proposal-gen:ci .
