name: Evals

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC

permissions:
  contents: read
  issues: write

jobs:
  live-evals:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.12"
      - run: uv sync --locked
      - name: Run live evals (10 calls via OpenRouter)
        env:
          LLM_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_BASE_URL: https://openrouter.ai/api/v1
          LLM_MODEL: google/gemini-2.5-flash-lite
        run: >
          uv run python scripts/run_evals.py --reps 2 --max-repairs 1
          --sleep 1 --fail-under-ok-rate 0.8 --output /tmp/eval-report.md
          --note "Scheduled weekly run via OpenRouter"
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eval-report
          path: /tmp/eval-report.md
      - name: Open an issue on degradation
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh issue create --title "Eval degradation detected ($(date -u +%F))"
          --body "The scheduled eval run failed its quality gate. See the run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} (report attached as artifact)."
