version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # The interpreter is pinned to 3.12 project-wide (.python-version, CI);
      # only digest freshness should flow for the base image.
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
